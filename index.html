function fetchLB(cb){
  fetch(SUPA_URL+"/rest/v1/leaderboard?select=name,score&order=score.desc&limit=10",{
    headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(r.status+": "+t)});
    return r.json();
  }).then(function(rows){cb(rows,null)}).catch(function(e){cb([],e)});
}
function postScore(name,sc){
  return fetch(SUPA_URL+"/rest/v1/leaderboard",{
    method:"POST",
    headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
    body:JSON.stringify({name:name,score:sc})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){console.error("Post failed:",r.status,t)});
  }).catch(function(e){console.error("Post error:",e)});
}

function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function lbContent(rows,hlName,hlScore){
  if(!rows||!rows.length) return '<h3>🏆 Leaderboard</h3><div style="color:#ffffff44;text-align:center;font-size:13px;padding:10px">No scores yet — be the first!</div>';
  var html='<h3>🏆 Leaderboard</h3>';
  var hit=false;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var rc=i===0?"r1":i===1?"r2":i===2?"r3":"";
    var me="";
    if(!hit&&hlName&&r.name===hlName&&r.score===hlScore){me="me";hit=true;}
    html+='<div class="lb-row '+me+'"><span class="lb-rank '+rc+'">'+(i+1)+'</span><span class="lb-name">'+escH(r.name)+'</span><span class="lb-sc">'+r.score+'</span></div>';
  }
  return html;
}

/* ═══════ COLOR UTIL ═══════ */
function dk(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return"rgb("+(Math.max(0,r*(1-a))|0)+","+(Math.max(0,g*(1-a))|0)+","+(Math.max(0,b*(1-a))|0)+")"}
function lt(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return"rgb("+(Math.min(255,r+(255-r)*a)|0)+","+(Math.min(255,g+(255-g)*a)|0)+","+(Math.min(255,b+(255-b)*a)|0)+")"}
function hexRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]}

/* ═══════ RESIZE ═══════ */
function resize(){
  dpr=window.devicePixelRatio||1;
  W=Math.min(420,window.innerWidth);
  H=window.innerHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx=canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  laneW=W/NLANES;
  hatZoneTop=H-100;
}
window.addEventListener("resize",resize);
resize();

/* ═══════ DRAW HELPERS ═══════ */
function drawY(x,y,ci,sz,ghost){
  var c=COLORS[ci],lc=lt(c,.3);
  var s=sz||1;
  ctx.lineCap="round";
  ctx.lineWidth=4.5*s;
  if(ghost){ ctx.globalAlpha=0.18; }
  ctx.strokeStyle=c;
  ctx.beginPath();ctx.moveTo(x,y+10*s);ctx.lineTo(x-14*s,y-8*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y+10*s);ctx.lineTo(x+14*s,y-8*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y+10*s);ctx.lineTo(x,y+24*s);ctx.stroke();
  ctx.fillStyle=lc;
  ctx.beginPath();ctx.arc(x-14*s,y-8*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+14*s,y-8*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=c;
  ctx.beginPath();ctx.arc(x,y+31*s,7*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.arc(x-3*s,y+30*s,1.8*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+3*s,y+30*s,1.8*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#1a1025";
  ctx.beginPath();ctx.arc(x-2.7*s,y+30.3*s,.9*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+3.3*s,y+30.3*s,.9*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#fff";ctx.lineWidth=.9*s;
  if(!ghost) ctx.globalAlpha=.6; else ctx.globalAlpha=.08;
  ctx.beginPath();ctx.arc(x,y+32*s,3*s,0.1*Math.PI,0.9*Math.PI);ctx.stroke();
  ctx.globalAlpha=1;
}

function drawHatFlipped(cx,ty,type,color){
  var d=dk(color,.25),l=lt(color,.22);
  ctx.lineWidth=0;
  ctx.save();
  ctx.translate(cx, ty+25);
  ctx.scale(1,-1);
  ctx.translate(-cx, -(ty+25));
  switch(type%5){
    case 0:
      roundRect(cx-28,ty-10+50-10,56,10,4,d);
      roundRect(cx-16,ty-10+50-42,32,34,4,color);
      ctx.globalAlpha=.3;roundRect(cx-16,ty-10+50-42,32,7,3,l);ctx.globalAlpha=1;
      ctx.globalAlpha=.5;roundRect(cx-17,ty-10+50-16,34,5,2,d);ctx.globalAlpha=1;
      break;
    case 1:
      ctx.fillStyle=color;
      ctx.beginPath();ctx.moveTo(cx-24,ty+50-8);
      ctx.quadraticCurveTo(cx-24,ty+50-34,cx,ty+50-36);
      ctx.quadraticCurveTo(cx+24,ty+50-34,cx+24,ty+50-8);
      ctx.closePath();ctx.fill();
      ctx.fillStyle=d;
      ctx.beginPath();ctx.moveTo(cx-28,ty+50-8);ctx.lineTo(cx-34,ty+50+2);
      ctx.quadraticCurveTo(cx-26,ty+50+6,cx-18,ty+50-2);ctx.closePath();ctx.fill();
      roundRect(cx-26,ty+50-10,52,5,2,d);
      ctx.fillStyle=l;ctx.globalAlpha=.5;
      ctx.beginPath();ctx.arc(cx,ty+50-36,3.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;break;
    case 2:
      ctx.fillStyle=d;
      ctx.beginPath();ctx.ellipse(cx,ty+50-4,27,6,0,0,Math.PI*2);ctx.fill();
      roundRect(cx-26,ty+50-8,52,7,3,d);
      ctx.fillStyle=color;
      ctx.beginPath();ctx.moveTo(cx,ty+50-52);ctx.lineTo(cx-24,ty+50-6);ctx.lineTo(cx+24,ty+50-6);ctx.closePath();ctx.fill();
      ctx.fillStyle="#fbbf24";ctx.globalAlpha=.7;
      ctx.beginPath();ctx.arc(cx-6,ty+50-18,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+6,ty+50-30,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx-2,ty+50-40,1.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;break;
    case 3:
      roundRect(cx-22,ty+50-22,44,20,3,color);
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.moveTo(cx-22,ty+50-20);ctx.lineTo(cx-26,ty+50-42);ctx.lineTo(cx-10,ty+50-26);
      ctx.lineTo(cx,ty+50-48);ctx.lineTo(cx+10,ty+50-26);
      ctx.lineTo(cx+26,ty+50-42);ctx.lineTo(cx+22,ty+50-20);
      ctx.closePath();ctx.fill();
      ctx.fillStyle=l;
      [[-26,-42],[0,-48],[26,-42]].forEach(function(p){
        ctx.beginPath();ctx.arc(cx+p[0],ty+50+p[1],3.5,0,Math.PI*2);ctx.fill();
      });
      ctx.fillStyle="#fff";ctx.globalAlpha=.2;
      [-8,0,8].forEach(function(ox){
        ctx.beginPath();ctx.arc(cx+ox,ty+50-12,3,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
      roundRect(cx-23,ty+50-4,46,4,2,d);break;
    case 4:
      ctx.fillStyle=l;ctx.globalAlpha=.7;
      ctx.beginPath();ctx.arc(cx,ty+50-42,5.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      ctx.fillStyle=color;
      ctx.beginPath();ctx.ellipse(cx,ty+50-18,25,24,0,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillRect(cx-25,ty+50-18,50,12);
      ctx.strokeStyle=d;ctx.lineWidth=2;ctx.globalAlpha=.2;
      [-10,0,10].forEach(function(ox){
        ctx.beginPath();ctx.moveTo(cx+ox,ty+50-40);ctx.lineTo(cx+ox*1.1,ty+50-8);ctx.stroke();
      });
      ctx.globalAlpha=1;
      roundRect(cx-25,ty+50-10,50,10,5,d);break;
  }
  ctx.restore();
}

function roundRect(x,y,w,h,r,fill){
  ctx.fillStyle=fill;
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();
}

/* ═══════ STARS BG ═══════ */
var stars=[];
for(var i=0;i<60;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.4,a:Math.random()*.3+.1});
var starOff=0;
function drawStars(){
  starOff=(starOff+.15)%H;
  ctx.save();
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    ctx.fillStyle="rgba(255,255,255,"+s.a+")";
    ctx.beginPath();
    ctx.arc(s.x*W,(s.y*H+starOff)%H,s.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

/* ═══════ SCREENSHOT ═══════ */
function generateResultImage(finalScore, finalLevel, finalBestCombo, isNewPB){
  var sw=400, sh=300;
  var sc=document.getElementById("shotCanvas");
  sc.width=sw*2; sc.height=sh*2;
  sc.style.width=sw+"px"; sc.style.height=sh+"px";
  var sx=sc.getContext("2d");
  sx.setTransform(2,0,0,2,0,0);
  var grad=sx.createLinearGradient(0,0,sw,sh);
  grad.addColorStop(0,"#1a1025");grad.addColorStop(1,"#2d1b4e");
  sx.fillStyle=grad;sx.fillRect(0,0,sw,sh);
  for(var i=0;i<30;i++){sx.fillStyle="rgba(255,255,255,"+(Math.random()*.25+.05)+")";sx.beginPath();sx.arc(Math.random()*sw, Math.random()*sh, Math.random()*1.2+.3, 0, Math.PI*2);sx.fill();}
  sx.textAlign="center";
  sx.font="700 28px 'Lilita One',cursive";sx.fillStyle="#f472b6";
  sx.shadowColor="#7c3aed";sx.shadowBlur=20;
  sx.fillText("Y's & Hats",sw/2,45);sx.shadowBlur=0;
  sx.font="700 64px 'Lilita One',cursive";sx.fillStyle="#fff";
  sx.fillText(finalScore,sw/2,130);
  sx.font="500 16px 'Quicksand',sans-serif";sx.fillStyle="#c4b5fd";
  sx.fillText("Level "+finalLevel+"  ·  Best Combo: "+finalBestCombo+"x",sw/2,165);
  if(isNewPB){sx.font="700 18px 'Lilita One',cursive";sx.fillStyle="#fbbf24";sx.fillText("★ NEW HIGH SCORE ★",sw/2,200);}
  sx.font="500 14px 'Quicksand',sans-serif";sx.fillStyle="#ffffff66";
  sx.fillText("Personal Best: "+personalBest,sw/2,235);
  sx.font="500 12px 'Quicksand',sans-serif";sx.fillStyle="#ffffff33";
  sx.fillText("Can you beat my score?",sw/2,275);
  return sc;
}

/* ═══════ ACTIVE Y HELPER ═══════ */
function getActiveY(){
  var best=null,bestPos=-Infinity;
  for(var i=0;i<ys.length;i++){
    var y=ys[i];
    if(y.done) continue;
    if(y.y>bestPos){bestPos=y.y;best=y;}
  }
  return best;
}

  state="leaderboard";
  overlay.innerHTML='<h2 style="font-size:32px">🏆 Leaderboard</h2>'
    +'<div class="lb" id="lbBox"><div style="color:#c4b5fd;text-align:center;font-size:13px;padding:10px">Loading...</div></div>'
    +'<button class="obtn pink" onclick="showMenu()" style="padding:10px 30px;font-size:16px;margin-top:8px">BACK</button>';
  overlay.style.display="flex";canvas.style.display="none";
  loadLB();
}

function showGameOver(){
  state="over";
  clearHold();
  var isNewPB=score>personalBest&&score>0;
  if(isNewPB) savePersonalBest(score);
  lastScore=score; lastLevel=level; lastBestCombo=bestCombo; lastIsNewPB=isNewPB;
  if(playerName&&score>0){
    postScore(playerName,score).then(function(){
      showGameOverWithValues(score, level, bestCombo, isNewPB);
    });
  } else {
    showGameOverWithValues(score, level, bestCombo, isNewPB);
  }
}

function showGameOverWithValues(s, lv, bc, isNewPB){
  state="over";
  overlay.innerHTML='<h2>Game Over</h2>'
    +'<div class="big">'+s+'</div>'
    +'<div class="detail">Level '+lv+' · Best combo: '+bc+'x</div>'
    +(isNewPB?'<div class="gold">★ NEW HIGH SCORE ★</div>':'')
    +(personalBest>0?'<div class="personal-best">Personal Best: '+personalBest+'</div>':'')
    +'<button class="obtn share" onclick="takeScreenshot()">📸 SCREENSHOT</button>'
    +'<button class="obtn share" onclick="emailScore()" style="background:linear-gradient(135deg,#f472b6,#ec4899)">📧 EMAIL SCORE</button>'
    +'<button class="obtn red" onclick="startGame()">TRY AGAIN</button>'
    +'<div class="lb" id="lbBox"></div>'
    +'<button class="obtn pink" onclick="showMenu()" style="padding:10px 30px;font-size:16px;margin-top:8px;margin-bottom:20px">MENU</button>';
  overlay.style.display="flex";canvas.style.display="none";
  loadLB(playerName, lastScore);
}

/* ═══════ GAME START ═══════ */
window.startGame=function(){
  var inp=document.getElementById("nameIn");
  if(inp) saveName(inp.value.trim());
  if(!playerName){
    if(inp){inp.style.borderColor="#ef4444";inp.focus();return;}
  }

  score=0;lives=3;combo=0;bestCombo=0;level=1;
  ys=[];floats=[];idC=0;hardDropTrails=[];
  clearHold();
  lastTapTime=0;lastTapLane=-1;
  shakeX=0;shakeY=0;

  var arr=[0,1,2,3,4];
  for(var i=4;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}
  active=arr.slice(0,NLANES);

  overlay.style.display="none";canvas.style.display="block";
  resize();
  state="playing";

  if(spawnT) clearInterval(spawnT);
  spawnT=setInterval(trySpawn,80);
  lastSpawnTime=performance.now();
}

/* ═══════ HOLD MANAGEMENT ═══════ */
function clearHold(){
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
  softDropping=false;
  holdStartTime=0;
}

/* ═══════ CANVAS TAP → LANE DETECTION ═══════ */
function getLaneFromX(px){
  var lane=Math.floor(px/laneW);
  return Math.max(0,Math.min(NLANES-1,lane));
}

/* Handle touch on canvas */
canvas.addEventListener("touchstart",function(e){
  if(state!=="playing") return;
  e.preventDefault();
  var touch=e.touches[0];
  var rect=canvas.getBoundingClientRect();
  var x=touch.clientX-rect.left;
  handleDown(getLaneFromX(x));
},{passive:false});

canvas.addEventListener("touchend",function(e){
  if(state!=="playing") return;
  e.preventDefault();
  clearHold();
},{passive:false});

canvas.addEventListener("touchmove",function(e){
  if(state!=="playing") return;
  e.preventDefault();
},{passive:false});

/* Handle mouse on canvas (desktop) */
canvas.addEventListener("mousedown",function(e){
  if(state!=="playing") return;
  e.preventDefault();
  var rect=canvas.getBoundingClientRect();
  var x=e.clientX-rect.left;
  handleDown(getLaneFromX(x));
});

canvas.addEventListener("mouseup",function(e){
  if(state!=="playing") return;
  clearHold();
});

canvas.addEventListener("contextmenu",function(e){e.preventDefault()});

function handleDown(lane){
  if(state!=="playing") return;
  var now=performance.now();
  moveTo(lane);
  if(lane===lastTapLane && (now-lastTapTime)<DOUBLE_TAP_MS){
    hardDrop(lane);
    lastTapTime=0;lastTapLane=-1;clearHold();return;
  }
  lastTapTime=now;lastTapLane=lane;
  clearHold();holdStartTime=now;
  holdTimer=setTimeout(function(){softDropping=true;}, HOLD_THRESHOLD);
}

/* ═══════ MOVE & DROP ═══════ */
function moveTo(laneIdx){
  if(state!=="playing") return;
  var a=getActiveY();if(!a) return;
  a.lane=laneIdx;
}

function hardDrop(lane){
  if(state!=="playing") return;
  var a=getActiveY();if(!a) return;
  if(lane!==undefined) a.lane=lane;
  var targetX=a.lane*laneW+laneW/2;
  hardDropTrails.push({x:targetX, y0:a.y, y1:hatZoneTop-YH+8, ci:a.ci, a:1});
  a.y=hatZoneTop-YH+10;a.drawX=targetX;
  shakeX=(Math.random()-.5)*3;shakeY=-1.5-Math.random()*1.5;
}

/* ═══════ SPAWNING ═══════ */
var lastSpawnTime=0;
function getSpawnInterval(){return Math.max(SPAWN_MIN, SPAWN0-(level-1)*120);}
function getMaxOnScreen(){return Math.min(MAX_ONSCREEN+Math.floor(level/2),12);}

function trySpawn(){
  if(state!=="playing") return;
  var now=performance.now();
  if(now-lastSpawnTime<getSpawnInterval()) return;
  if(ys.length>=getMaxOnScreen()) return;
  lastSpawnTime=now;spawnOne();
}

function spawnOne(){
  var targetLane=Math.floor(Math.random()*NLANES);
  var ci=active[targetLane];
  var startLane=Math.floor(Math.random()*NLANES);
  if(Math.random()>.25) while(startLane===targetLane) startLane=Math.floor(Math.random()*NLANES);
  ys.push({id:idC++, y:-YH, lane:startLane, targetLane:targetLane, ci:ci, drawX:startLane*laneW+laneW/2, spawnTime:performance.now()});
}

/* ═══════ MAIN LOOP ═══════ */
var lastT=0;
function loop(t){
  var dt=Math.min(t-lastT,32);lastT=t;
  requestAnimationFrame(loop);
  ctx.save();
  ctx.translate(shakeX, shakeY);
  shakeX*=0.8; shakeY*=0.8;
  if(Math.abs(shakeX)<0.1) shakeX=0;
  if(Math.abs(shakeY)<0.1) shakeY=0;
  ctx.clearRect(-10,-10,W+20,H+20);
  ctx.fillStyle="#1a1025";ctx.fillRect(-10,-10,W+20,H+20);
  drawStars();
  if(state==="playing") updateGame(dt);
  if(state==="playing") drawGame();
  ctx.restore();
}

function updateGame(dt){
  var baseSpeed=(FALL0+(level-1)*.18)*(dt/16);
  var toRemove={};
  var activeY=getActiveY();
  for(var i=0;i<ys.length;i++){
    var y=ys[i];
    var isActive=(y===activeY);
    var spd=isActive&&softDropping ? baseSpeed*SOFT_DROP_MULT : baseSpeed;
    y.y+=spd;
    var tx=y.lane*laneW+laneW/2;
    y.drawX+=(tx-y.drawX)*.22;
    if(y.y+YH>hatZoneTop+8&&!y.done){
      y.done=true;toRemove[y.id]=true;
      if(y.lane===y.targetLane){
        var elapsed=performance.now()-y.spawnTime;
        var rushBonus=Math.max(0,Math.round(RUSH_BONUS_MAX*(1-elapsed/8000)));
        var pts=10+Math.floor(combo*5)+level*2+rushBonus;
        score+=pts;combo++;
        if(combo>bestCombo)bestCombo=combo;
        if(score>120*level)level++;
        var bonusTxt=rushBonus>0?' +'+rushBonus+'⚡':'';
        addFloat(y.drawX,hatZoneTop-20,"+"+pts+bonusTxt,COLORS[y.ci]);
      } else {
        lives--;combo=0;
        addFloat(y.drawX,hatZoneTop-20,"MISS","#ef4444");
      }
    }
  }
  var newYs=[];
  for(var i=0;i<ys.length;i++){if(!toRemove[ys[i].id])newYs.push(ys[i]);}
  ys=newYs;
  var newFloats=[];
  for(var i=0;i<floats.length;i++){floats[i].y-=1.5;floats[i].a-=.02;if(floats[i].a>0)newFloats.push(floats[i]);}
  floats=newFloats;
  var newTrails=[];
  for(var i=0;i<hardDropTrails.length;i++){hardDropTrails[i].a-=.08;if(hardDropTrails[i].a>0)newTrails.push(hardDropTrails[i]);}
  hardDropTrails=newTrails;
  if(lives<=0){if(spawnT)clearInterval(spawnT);showGameOver();}
}

function addFloat(x,y,txt,color){floats.push({x:x,y:y,txt:txt,color:color,a:1});}

function drawGame(){
  ctx.strokeStyle="rgba(255,255,255,.06)";ctx.lineWidth=1;
  for(var i=1;i<NLANES;i++){ctx.beginPath();ctx.moveTo(i*laneW,0);ctx.lineTo(i*laneW,hatZoneTop);ctx.stroke();}
  for(var i=0;i<NLANES;i++){drawHatFlipped(i*laneW+laneW/2, hatZoneTop+6, active[i], COLORS[active[i]]);}
  for(var i=0;i<NLANES;i++){
    var rgb=hexRgb(COLORS[active[i]]);
    var grad=ctx.createLinearGradient(0,hatZoneTop-30,0,hatZoneTop+10);
    grad.addColorStop(0,"rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",0)");
    grad.addColorStop(1,"rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+",.08)");
    ctx.fillStyle=grad;ctx.fillRect(i*laneW,hatZoneTop-30,laneW,40);
  }
  for(var i=0;i<hardDropTrails.length;i++){
    var tr=hardDropTrails[i];var rgb=hexRgb(COLORS[tr.ci]);
    ctx.fillStyle="rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(tr.a*0.25)+")";
    ctx.fillRect(tr.x-2,tr.y0,4,tr.y1-tr.y0);
  }
  var activeY=getActiveY();
  if(activeY){drawY(activeY.lane*laneW+laneW/2, hatZoneTop-YH+8, activeY.ci, 1, true);}
  for(var i=0;i<ys.length;i++){drawY(ys[i].drawX, ys[i].y, ys[i].ci, 1, false);}
  if(activeY && softDropping){
    var ax=activeY.drawX, ay=activeY.y;
    ctx.strokeStyle=COLORS[activeY.ci];ctx.lineWidth=1;ctx.globalAlpha=0.25;
    for(var i=0;i<3;i++){var ox=(i-1)*7;ctx.beginPath();ctx.moveTo(ax+ox, ay-10-i*5);ctx.lineTo(ax+ox, ay-10-i*5+6);ctx.stroke();}
    ctx.globalAlpha=1;
  }
  ctx.textAlign="center";ctx.font="700 22px 'Lilita One',cursive";
  for(var i=0;i<floats.length;i++){var f=floats[i];ctx.globalAlpha=Math.max(0,f.a);ctx.fillStyle=f.color;ctx.fillText(f.txt,f.x,f.y);}
  ctx.globalAlpha=1;
  ctx.textAlign="left";ctx.font="20px sans-serif";
  var hearts="";for(var i=0;i<Math.max(0,lives);i++)hearts+="❤️";for(var i=0;i<Math.max(0,3-lives);i++)hearts+="🖤";
  ctx.fillText(hearts,12,30);
  ctx.textAlign="center";ctx.font="700 16px 'Lilita One',cursive";ctx.fillStyle="#c4b5fd";ctx.fillText("Lv."+level,W/2,28);
  ctx.textAlign="right";ctx.font="700 24px 'Lilita One',cursive";ctx.fillStyle="#fbbf24";ctx.fillText(score,W-12,30);
  if(personalBest>0){ctx.textAlign="right";ctx.font="700 11px 'Lilita One',cursive";ctx.fillStyle="#ffffff44";ctx.fillText("BEST: "+personalBest,W-12,46);}
  if(combo>1){ctx.textAlign="center";ctx.font="700 15px 'Lilita One',cursive";ctx.fillStyle="#34d399";ctx.fillText(combo+"x COMBO!",W/2,48);}
}

/* ═══════ KEYBOARD ═══════ */
var keysDown={};
document.addEventListener("keydown",function(e){
  if(state!=="playing") return;
  var k=e.key.toLowerCase();
  var lane=-1;
  if(k>="1"&&k<="4") lane=parseInt(k)-1;
  else if(k==="a") lane=0;else if(k==="s") lane=1;else if(k==="d") lane=2;else if(k==="f") lane=3;
  if(lane>=0 && !keysDown[k]){keysDown[k]=true;handleDown(lane);}
  if(k==="arrowdown"||k===" "){e.preventDefault();var a=getActiveY();if(a) hardDrop(a.lane);}
});
document.addEventListener("keyup",function(e){
  var k=e.key.toLowerCase();
  if(keysDown[k]){delete keysDown[k];clearHold();}
});

/* ═══════ INIT ═══════ */
loadData();
showMenu();
requestAnimationFrame(loop);
</script>
</body>
</html>
